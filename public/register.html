<!DOCTYPE html>
<html>
<head>
    <title>ZYROFEST-{CTF}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 🔥 NAVBAR -->
<div class="nav">
    <div class="left">
        <div class="logo">ZYROFEST-{CTF}</div>
    </div>
    <div class="right">
        <button onclick="toggleTheme()" id="themeBtn" class="theme-btn">🌙</button>
    </div>
</div>

<!-- 🔥 CONTENT -->
<div class="container">
    <div class="register-box card">
        <h2>REGISTER</h2>

        <form class="form-box" method="POST" action="/index.html">
            <input type="text" name="username" placeholder="CHOOSE USERNAME" required minlength="8">
            <input type="password" name="password" placeholder="PASSWORD" minlength="8" required>
            <select name="team_action" style="margin-bottom: 10px; padding: 10px; width: 100%; font-family: 'Press Start 2P', cursive; font-size: 10px; background: black; color: lime; border: 2px solid lime;" required>
                <option value="none">No Team (Individual)</option>
                <option value="create">Register New Team</option>
                <option value="join">Join Existing Team</option>
            </select>
            <input type="text" name="team_name" placeholder="TEAM NAME (Optional)">
            <button type="button" onclick="window.location.href='/index.html'">REGISTER (MOCK)</button>
        </form>
    </div>
</div>

<!-- 🔥 FOOTER -->
<footer class="footer">
    <p>Developed by <b>sedhu madhavan</b></p>
</footer>

<!-- 🔥 THEME SCRIPT -->
<script>
function toggleTheme() {
    let body = document.body;
    if (body.classList.contains("dark")) {
        body.classList.remove("dark");
        localStorage.setItem("theme", "light");
        document.getElementById("themeBtn").innerText = "🌙";
    } else {
        body.classList.add("dark");
        localStorage.setItem("theme", "dark");
        document.getElementById("themeBtn").innerText = "☀️";
    }
}
window.onload = function() {
    let theme = localStorage.getItem("theme");
    if (theme === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeBtn").innerText = "☀️";
    }
}
</script>

</body>
</html>
